### model
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
adapter_name_or_path: ../output/qwen3-4b/lora/sft
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
pref_beta: 0.05
pref_loss: sigmoid  # choices: [sigmoid (dpo), orpo, simpo]

### dataset
dataset_dir: ../configs
dataset: sentiment_dpo_train
template: qwen3_nothink
cutoff_len: 512
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: ../output/qwen3-4b/lora/dpo
logging_steps: 10
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb  # choices: [none, wandb, tensorboard, swanlab, mlflow]
run_name: qwen3_dpo_sentiment

### train
per_device_train_batch_size: 32
gradient_accumulation_steps: 1
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
# DPO eval requires ranking-format dataset, use val evaluation script instead
# eval_dataset: sentiment_dpo_train
# per_device_eval_batch_size: 32
# eval_strategy: steps
# eval_steps: 50

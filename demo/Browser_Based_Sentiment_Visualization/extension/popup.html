<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width: 280px;
    background: #fff;
    color: #111;
  }

  /* Header */
  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #eee;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .status-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 6px;
    font-size: 12px;
    color: #555;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #d1d5db;
    flex-shrink: 0;
  }
  .dot.ready      { background: #22c55e; }
  .dot.loading,
  .dot.switching  { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
  .dot.error      { background: #ef4444; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Model list */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 12px 16px 6px;
  }

  .model-list { padding: 0 16px; }

  .model-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .model-item:hover { background: #f3f4f6; }
  .model-item.selected { background: #eff6ff; }

  .model-item input[type="radio"] { accent-color: #3b82f6; width: 15px; height: 15px; cursor: pointer; }

  .model-info { flex: 1; }
  .model-name  { font-size: 13px; font-weight: 500; }
  .model-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-top: 2px;
    display: inline-block;
  }
  .model-badge.active  { background: #dcfce7; color: #166534; }
  .model-badge.idle    { background: #f3f4f6; color: #6b7280; }

  /* Apply button */
  .footer {
    padding: 12px 16px 14px;
    border-top: 1px solid #eee;
    margin-top: 8px;
  }
  #applyBtn {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  #applyBtn:hover:not(:disabled) { background: #2563eb; }
  #applyBtn:disabled { opacity: .5; cursor: not-allowed; }

  .apply-note {
    font-size: 11px;
    color: #9ca3af;
    text-align: center;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Sentiment Analyzer</h1>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<div class="section-title">Select Model</div>
<div class="model-list" id="modelList">
  <div style="padding:8px;font-size:12px;color:#9ca3af;">Loading models…</div>
</div>

<div class="footer">
  <button id="applyBtn" disabled>Apply</button>
  <div class="apply-note" id="applyNote"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
